<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>VulnBank</title>
    <style>
        body { font-family: system-ui, sans-serif; background: #eef1f5; }
        .card { max-width: 340px; margin: 80px auto; background: #fff; padding: 28px;
                border-radius: 8px; box-shadow: 0 2px 10px rgba(0,0,0,.1); }
        h1 { font-size: 20px; margin: 0 0 20px; color: #234; }
        label { display: block; font-size: 13px; color: #556; margin: 12px 0 4px; }
        input { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccd;
                border-radius: 4px; }
        button { width: 100%; margin-top: 18px; padding: 9px; background: #2a6; color: #fff;
                 border: 0; border-radius: 4px; font-size: 14px; cursor: pointer; }
        #out { margin-top: 16px; padding: 12px; border-radius: 4px; font-size: 14px;
               display: none; }
        .ok { background: #e6f6ec; color: #1a5; }
        .ko { background: #fdeaea; color: #c33; }
    </style>
</head>
<body>
    <div class="card">
        <h1>VulnBank · Acceso</h1>
        <label>Usuario</label>
        <input id="username" autocomplete="off">
        <label>Contraseña</label>
        <input id="password" type="password">
        <button onclick="entrar()">Entrar</button>
        <div id="out"></div>
    </div>

    <script>
        async function entrar() {
            const out = document.getElementById('out');
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: document.getElementById('username').value,
                    password: document.getElementById('password').value
                })
            });
            const data = await res.json();
            out.style.display = 'block';
            if (data.ok) {
                const u = data.user;
                out.className = 'ok';
                out.innerHTML = 'Bienvenido, <b>' + u.USERNAME + '</b> (' + u.ROLE +
                    ') · saldo: ' + u.BALANCE + ' €';
            } else {
                out.className = 'ko';
                out.textContent = data.message;
            }
        }
    </script>
</body>
</html>
